# Example: nginx site for https://hill.example.com → Docker app on 127.0.0.1:8080
#
# 1. Point DNS A/AAAA record: hill.example.com → your server IP
# 2. Obtain TLS certs (e.g. certbot --nginx -d hill.example.com)
# 3. Include this server block or symlink from sites-enabled
#
# Upstream: if using docker compose, the app listens on host port 8080 (see PUBLISH_PORT)

server {
    listen 443 ssl http2;
    server_name hill.example.com;

    # ssl_certificate     /etc/letsencrypt/live/hill.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hill.example.com/privkey.pem;

    client_max_body_size 12k;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name hill.example.com;
    return 301 https://$host$request_uri;
}
