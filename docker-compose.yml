# Hill cipher web UI — run: docker compose up --build
# Subdomain: terminate TLS on a reverse proxy (see deploy/subdomain.nginx.conf)
services:
  hill-web:
    build: .
    ports:
      - "${PUBLISH_PORT:-8080}:8080"
    environment:
      WEB_APP_HOST: "0.0.0.0"
      PORT: "8080"
    restart: unless-stopped
